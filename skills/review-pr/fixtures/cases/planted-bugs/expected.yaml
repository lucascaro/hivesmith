verdict: REQUEST_CHANGES
must_find:
  - file: app/db.py
    line_range: [10, 14]
    category: security
    keywords: [sql, injection]
  # The unsynchronized _counter increment sits under two checklists: "Concurrency
  # — data races" (correctness) and "global/module-level mutable state" (safety).
  # Either label is a correct reading, so grade on the defect, not the taxonomy.
  - file: app/db.py
    line_range: [17, 22]
    category: safety|correctness
    keywords: [race]
  - file: app/db.py
    line_range: [25, 33]
    category: correctness
    keywords: [off-by-one]
  - file: app/db.py
    line_range: [35, 36]
    category: security
    keywords: [secret]
must_not_find: []
max_findings: 8
