name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `labeled` / `unlabeled` are included so adding/removing the
    # `regen-override` or `no-changeset` bypass labels after a PR opens
    # re-runs the gate jobs. Without these, the labels would be checked
    # only against their initial value.
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master as of 2026-04-13
        with:
          scandir: '.'
          additional_files: >-
            install.sh
            scripts/dev-link-local.sh
            scripts/release.sh
            skills/feature-ingest/ingest.sh
            skills/namecheck/namecheck.sh
            templates/features/ingest.sh
            templates/scripts/release.sh
            scripts/brain/lib.sh
            scripts/brain/read.sh
            scripts/brain/append.sh
            scripts/brain/redact.sh
            scripts/brain/index.sh
            scripts/brain/list.sh
            scripts/brain/search.sh
            scripts/brain/test/run-all.sh
            scripts/regen-generated.sh
            scripts/migrate-to-changesets.sh
            skills/brain-promote/promote.sh
            skills/brain-garden/garden.sh

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Smoke test — with prefix
        run: |
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/.claude"
          ./install.sh --prefix hs- --no-auto-update --dry-run
      - name: Smoke test — without prefix
        run: |
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/.claude"
          ./install.sh --prefix "" --no-auto-update --dry-run

  render-correctness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install with prefix and verify render
        run: |
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/.claude"
          HIVESMITH_DIR="$(pwd)"
          ./install.sh --prefix hs- --no-auto-update
          grep -q '/hs-feature-plan' "$HIVESMITH_DIR/.rendered/hs-/skills/hs-feature-research/SKILL.md"
          ! grep -q '/feature-plan\b' "$HIVESMITH_DIR/.rendered/hs-/skills/hs-feature-research/SKILL.md"
          grep -q 'scripts/release.sh' "$HIVESMITH_DIR/.rendered/hs-/skills/hs-release/SKILL.md"

  brain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run brain test suite
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "ci"
          bash scripts/brain/test/run-all.sh

  block-generated-edits:
    # Hard-fail any PR that touches a generated aggregate file directly.
    # Bypass: apply the `regen-override` label (e.g. migration PRs,
    # regenerator-bug fixes, history imports).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fail if PR edits generated files
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          GENERATED=(
            CHANGELOG.md
            docs/product-specs/index.md
            docs/exec-plans/tech-debt-tracker.md
          )
          touched=$(git diff --name-only "$BASE"..."$HEAD" -- "${GENERATED[@]}")
          if [ -n "$touched" ]; then
            # Use jq because the rendered JSON includes whitespace
            # (`"name": "regen-override"`), which a literal grep would miss.
            if printf '%s' "$PR_LABELS" | jq -e '.[] | select(.name == "regen-override")' >/dev/null 2>&1; then
              echo "OK: regen-override label present — bypassing check."
              echo "Touched:"
              echo "$touched"
              exit 0
            fi
            echo "::error::PR edits generated files directly:"
            echo "$touched"
            echo "These files are regenerated on main from .changesets/, spec frontmatter, and .tech-debt/."
            echo "Edit the source files instead, or apply the 'regen-override' label if this is intentional."
            exit 1
          fi
          echo "OK: no generated files were touched."

  verify-generated:
    # Drift + interaction-bug detection. Runs the regenerator and fails if any
    # source frontmatter is invalid. Also checks that the PR (or the merged
    # state, via the GitHub-computed merge ref) carries at least one changeset
    # unless labelled `no-changeset`.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need access to both the PR branch and the merge ref for the
          # interaction-bug pre-check.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.event.pull_request.head.sha }}
      - name: Regenerate against the merge ref (catches interaction bugs)
        # NOT `--check` — that would fail any PR that adds a source file
        # because the committed generated copies legitimately lag (they are
        # rewritten by `regenerate-generated` on push to main). The bare run
        # exits non-zero only when the source frontmatter is invalid, which
        # is exactly what we want this job to catch.
        run: scripts/regen-generated.sh
      - name: Require a changeset unless labelled no-changeset
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # jq, not grep — rendered JSON includes whitespace
          # (`"name": "no-changeset"`) that a literal grep would miss.
          if printf '%s' "$PR_LABELS" | jq -e '.[] | select(.name == "no-changeset")' >/dev/null 2>&1; then
            echo "OK: no-changeset label present — skipping requirement."
            exit 0
          fi
          if git diff --name-only "$BASE"..."$HEAD" -- ':(glob).changesets/*.md' | grep -v '^.changesets/README.md$' | grep -q .; then
            echo "OK: PR adds at least one changeset."
            exit 0
          fi
          echo "::error::PR has no .changesets/*.md entry."
          echo "Add a per-PR changeset with 'See .changesets/README.md' for the schema,"
          echo "or apply the 'no-changeset' label if this is a docs/CI-only change."
          exit 1

  regenerate-generated:
    # Post-merge: regenerate aggregates on main and direct-push the result.
    # Uses [skip ci] to avoid runaway re-trigger; the next legitimate merge
    # will rerun this job naturally.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Regenerate aggregates
        run: scripts/regen-generated.sh
      - name: Commit + push if changed
        run: |
          if [ -z "$(git status --porcelain CHANGELOG.md docs/product-specs/index.md docs/exec-plans/tech-debt-tracker.md)" ]; then
            echo "no changes to commit"
            exit 0
          fi
          git config user.name  "hivesmith-bot"
          git config user.email "hivesmith-bot@users.noreply.github.com"
          git add CHANGELOG.md docs/product-specs/index.md docs/exec-plans/tech-debt-tracker.md
          git commit -m "chore: regenerate aggregates [skip ci]"
          git push

  # Informational — macOS smoke. Not used as a branch-protection context.
  install-smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Smoke test — macOS
        run: |
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/.claude"
          ./install.sh --prefix hs- --no-auto-update --dry-run
