name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `install.sh --prefix hs-`
        2. Invoke `/hs-feature-plan`
        3. …
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - WSL
        - Other
    validations:
      required: true

  - type: input
    id: bash-version
    attributes:
      label: Bash version
      description: Output of `bash --version`
      placeholder: GNU bash, version 5.2.x
    validations:
      required: true

  - type: textarea
    id: installer-output
    attributes:
      label: Installer output (optional)
      description: Paste the full output of `install.sh` if relevant.
      render: shell
